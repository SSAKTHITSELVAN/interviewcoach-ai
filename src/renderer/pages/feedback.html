<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback — InterviewCouch</title>
  <link rel="stylesheet" href="../css/app.css">
  <style>
    body{overflow:auto}
    .fb-wrap{max-width:820px;margin:0 auto;padding:32px}
    .fb-header{text-align:center;margin-bottom:40px}
    .fb-header .trophy{font-size:48px;margin-bottom:12px}
    .fb-header h2{font-size:1.8rem;font-weight:700;margin-bottom:6px}
    .fb-header p{color:var(--t2);font-size:15px}

    /* Score cards */
    .scores-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .score-card{
      background:var(--s1);border:1px solid var(--border);
      border-radius:var(--r-lg);padding:20px 16px;text-align:center;
    }
    .score-card h5{font-size:11px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;color:var(--t2);margin-bottom:12px}

    /* Circular ring */
    .ring{position:relative;width:80px;height:80px;margin:0 auto}
    .ring svg{transform:rotate(-90deg);display:block}
    .ring-track{fill:none;stroke:var(--s3);stroke-width:6}
    .ring-fill{fill:none;stroke:var(--t1);stroke-width:6;stroke-linecap:round;
      transition:stroke-dashoffset 1.2s ease .2s}
    .ring-label{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .ring-num{font-size:20px;font-weight:700;line-height:1}
    .ring-den{font-size:10px;color:var(--t3)}

    /* Recommendation banner */
    .rec-banner{
      border-radius:var(--r-lg);padding:20px 24px;
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;border:1px solid;
    }
    .rec-banner.hire{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25)}
    .rec-banner.maybe{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.25)}
    .rec-banner.no{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25)}
    .rec-left h4{font-size:14px;font-weight:600;margin-bottom:2px}
    .rec-left p{font-size:13px;color:var(--t2)}

    /* Strengths / improvements */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .list-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px}
    .list-card h4{font-size:13px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:14px;color:var(--t2)}
    .list-item{
      display:flex;align-items:flex-start;gap:10px;
      font-size:13px;padding:8px 0;
      border-bottom:1px solid var(--border);line-height:1.5;
    }
    .list-item:last-child{border:none}
    .list-icon{flex-shrink:0;font-size:14px;margin-top:1px}

    /* Summary */
    .summary-card{
      background:var(--s1);border:1px solid var(--border);
      border-radius:var(--r-lg);padding:20px 24px;margin-bottom:24px;
    }
    .summary-card h4{font-size:13px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;color:var(--t2);margin-bottom:10px}
    .summary-card p{font-size:14px;line-height:1.7;color:var(--t1)}

    .action-row{display:flex;justify-content:center;gap:12px;padding-bottom:24px}
  </style>
</head>
<body class="page fade-in">

  <!-- Titlebar -->
  <div class="titlebar">
    <div class="tb-brand"><div class="tb-dot"></div>InterviewCouch</div>
    <div class="tb-controls">
      <button class="tb-btn" onclick="window.api.window.minimize()">—</button>
      <button class="tb-btn" onclick="window.api.window.maximize()">⤢</button>
      <button class="tb-btn close" onclick="window.api.window.close()">✕</button>
    </div>
  </div>

  <main style="flex:1;overflow-y:auto">
    <div class="fb-wrap">

      <!-- Header -->
      <div class="fb-header">
        <div class="trophy" id="trophyEmoji">🏆</div>
        <h2>Interview Complete</h2>
        <p id="fbSubtitle">Analysing your performance…</p>
      </div>

      <!-- Score cards -->
      <div class="scores-grid" id="scoresGrid">
        <div class="score-card"><h5>Overall</h5>
          <div class="ring" id="ring-overall"><svg viewBox="0 0 80 80"><circle class="ring-track" cx="40" cy="40" r="34"/><circle class="ring-fill" id="fill-overall" cx="40" cy="40" r="34" stroke-dasharray="214" stroke-dashoffset="214"/></svg><div class="ring-label"><span class="ring-num" id="num-overall">—</span><span class="ring-den">/10</span></div></div>
        </div>
        <div class="score-card"><h5>Technical</h5>
          <div class="ring"><svg viewBox="0 0 80 80"><circle class="ring-track" cx="40" cy="40" r="34"/><circle class="ring-fill" id="fill-technical" cx="40" cy="40" r="34" stroke-dasharray="214" stroke-dashoffset="214"/></svg><div class="ring-label"><span class="ring-num" id="num-technical">—</span><span class="ring-den">/10</span></div></div>
        </div>
        <div class="score-card"><h5>Communication</h5>
          <div class="ring"><svg viewBox="0 0 80 80"><circle class="ring-track" cx="40" cy="40" r="34"/><circle class="ring-fill" id="fill-communication" cx="40" cy="40" r="34" stroke-dasharray="214" stroke-dashoffset="214"/></svg><div class="ring-label"><span class="ring-num" id="num-communication">—</span><span class="ring-den">/10</span></div></div>
        </div>
        <div class="score-card"><h5>Confidence</h5>
          <div class="ring"><svg viewBox="0 0 80 80"><circle class="ring-track" cx="40" cy="40" r="34"/><circle class="ring-fill" id="fill-confidence" cx="40" cy="40" r="34" stroke-dasharray="214" stroke-dashoffset="214"/></svg><div class="ring-label"><span class="ring-num" id="num-confidence">—</span><span class="ring-den">/10</span></div></div>
        </div>
      </div>

      <!-- Recommendation banner -->
      <div class="rec-banner" id="recBanner" style="display:none">
        <div class="rec-left">
          <h4 id="recTitle">Recommendation</h4>
          <p id="recSub">Based on your interview performance</p>
        </div>
        <div class="badge" id="recBadge">—</div>
      </div>

      <!-- Strengths & Improvements -->
      <div class="two-col" id="twoCol" style="display:none">
        <div class="list-card">
          <h4>✅ Strengths</h4>
          <div id="strengthsList"></div>
        </div>
        <div class="list-card">
          <h4>📈 Improve On</h4>
          <div id="improvList"></div>
        </div>
      </div>

      <!-- Summary -->
      <div class="summary-card" id="summaryCard" style="display:none">
        <h4>Evaluation Summary</h4>
        <p id="summaryText"></p>
      </div>

      <!-- Loading placeholder -->
      <div id="loadingBlock" style="text-align:center;padding:40px">
        <div class="spinner" style="width:32px;height:32px;margin:0 auto 16px"></div>
        <p class="text-sm muted">Generating detailed feedback…</p>
      </div>

      <!-- Actions -->
      <div class="action-row" id="actionRow" style="display:none">
        <button class="btn btn-outline" onclick="window.api.navigate('setup')">
          Practice Again
        </button>
        <button class="btn btn-primary btn-lg" onclick="window.api.navigate('home')">
          Back to Home
        </button>
      </div>

    </div>
  </main>

  <script>
    const CIRCUMFERENCE = 214; // 2π × 34

    function setRing(id, score) {
      const offset = CIRCUMFERENCE - (score / 10) * CIRCUMFERENCE;
      document.getElementById(`fill-${id}`).style.strokeDashoffset = offset;
      document.getElementById(`num-${id}`).textContent = score;
    }

    function recConfig(rec) {
      if (!rec) return { cls: 'maybe', badge: 'badge-muted', label: 'Undecided' };
      const r = rec.toLowerCase();
      if (r.includes('strong'))   return { cls: 'hire',  badge: 'badge-green', label: '⭐ Strong Hire' };
      if (r.includes('hire'))     return { cls: 'hire',  badge: 'badge-green', label: '✅ Hire' };
      if (r.includes('maybe'))    return { cls: 'maybe', badge: 'badge-amber', label: '🤔 Maybe' };
      return                             { cls: 'no',    badge: 'badge-red',   label: '❌ No Hire' };
    }

    async function loadFeedback() {
      const fb = await window.api.store.get('lastFeedback');
      document.getElementById('loadingBlock').style.display = 'none';

      if (!fb) {
        document.getElementById('fbSubtitle').textContent = 'Session saved. Keep practising!';
        document.getElementById('actionRow').style.display = 'flex';
        return;
      }

      // Scores
      ['overall','technical','communication','confidence'].forEach(k => {
        const score = fb[`${k}_score`] || fb[k] || 0;
        setRing(k, score);
      });

      document.getElementById('fbSubtitle').textContent =
        `Overall score: ${fb.overall_score}/10 — Keep pushing!`;

      // Trophy
      const s = fb.overall_score || 0;
      document.getElementById('trophyEmoji').textContent =
        s >= 8 ? '🏆' : s >= 6 ? '🥈' : s >= 4 ? '🥉' : '📚';

      // Recommendation
      const rc = recConfig(fb.recommendation);
      const banner = document.getElementById('recBanner');
      banner.classList.add(rc.cls);
      banner.style.display = 'flex';
      document.getElementById('recBadge').className = `badge ${rc.badge}`;
      document.getElementById('recBadge').textContent = rc.label;
      document.getElementById('recTitle').textContent = fb.recommendation || 'Assessment';

      // Strengths
      const sl = document.getElementById('strengthsList');
      (fb.strengths || []).forEach(s => {
        const el = document.createElement('div');
        el.className = 'list-item';
        el.innerHTML = `<span class="list-icon">✓</span><span>${escHtml(s)}</span>`;
        sl.appendChild(el);
      });

      // Improvements
      const il = document.getElementById('improvList');
      (fb.improvements || []).forEach(i => {
        const el = document.createElement('div');
        el.className = 'list-item';
        el.innerHTML = `<span class="list-icon">→</span><span>${escHtml(i)}</span>`;
        il.appendChild(el);
      });

      document.getElementById('twoCol').style.display = 'grid';

      // Summary
      if (fb.summary) {
        document.getElementById('summaryText').textContent = fb.summary;
        document.getElementById('summaryCard').style.display = 'block';
      }

      document.getElementById('actionRow').style.display = 'flex';

      // Update stats
      const stats = await window.api.store.get('stats') || { total: 0 };
      if (!stats.bestScore || fb.overall_score > stats.bestScore) {
        stats.bestScore = fb.overall_score;
        await window.api.store.set('stats', stats);
      }
    }

    function escHtml(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadFeedback();
  </script>
</body>
</html>
